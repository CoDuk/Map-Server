version: "3.8"

services:
  api:
    image: heezuko/duksungmap-api:latest
    container_name: duksungmap_api
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "8080:8080"
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: duksungmap_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - duksungmap_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  duksungmap_redis_data: